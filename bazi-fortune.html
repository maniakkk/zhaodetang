function calcResult(a){
  const ze = ZE[a.zodiac].e, te = TE[a.birth_time], pe = a.element, se = SE[a.zodiac_sign];
  const c = {metal:0,wood:0,water:0,fire:0,earth:0};
  [ze,te,pe,se].forEach(e=>{if(c[e]!==undefined)c[e]++});
  const mx = Math.max(...Object.values(c));
  const dom = Object.keys(c).filter(k=>c[k]===mx);
  const has=(e)=>c[e]>=2;
  const combo=(a,b)=>c[a]>=1&&c[b]>=1;

  let k;
  if(has('metal')&&has('earth')) k='golden_toad';
  else if(has('metal')&&has('water')) k='white_crane';
  else if(has('fire')&&c.fire>=2) k='phoenix_fire';
  else if(has('water')&&c.water>=2&&combo('water','metal')) k='silver_carp';
  else if(has('water')&&c.water>=2) k='dark_turtle';
  else if(has('wood')&&has('fire')) k='deer_spring';
  else if(has('wood')&&c.wood>=2) k='jade_rabbit';
  else if(has('earth')&&c.earth>=2&&combo('earth','water')) k='blue_ox';
  else if(has('earth')&&c.earth>=2&&combo('earth','fire')) k='unicorn_mountain';
  else if(has('water')&&has('fire')) k='phoenix_mate';
  else if(has('metal')&&c.metal>=2) k='golden_dragon';
  else if(has('earth')&&has('water')) k='turtle_fortune';
  else k='purple_star';

  if(a.focus==='health'&&k==='blue_ox') k='jade_rabbit';
  if(a.focus==='wealth'&&(k==='jade_rabbit'||k==='unicorn_mountain')) k='golden_toad';

  return R[k]||FALLBACK;
}

let cur = 0;
const ans = {};

function startQuiz(){
  document.getElementById('screenCover').classList.remove('active');
  document.getElementById('screenQuiz').classList.add('active');
  cur=0; renderQ();
}

function renderQ(){
  const q=Q[cur], card=document.getElementById('quizCard');
  const total=Q.length;
  let html=`<div class="quiz-qnum">第 ${cur+1}/${total} 题</div><div class="quiz-q">${q.q}</div><div class="quiz-desc">${q.desc}</div><div class="quiz-options">`;
  q.options.forEach(o=>{
    const sel=ans[q.key]===o.v?' selected':'';
    html+=`<div class="quiz-opt${sel}" onclick="sel('${q.key}','${o.v}')"><span>${o.l}</span><span class="badge">${o.badge}</span></div>`;
  });
  html+=`</div><div class="btn-row">${cur>0?'<button class="btn-prev" onclick="prev()">← 上一题</button>':''}<button class="btn-next${ans[q.key]?' active':''}" id="btnNext" onclick="next()">${cur===total-1?'🔮 查看命盘 →':'下一步 →'}</button></div>`;
  card.innerHTML=html;
  updateProgress();
}

function sel(k,v){ans[k]=v;renderQ();}

function next(){
  const q=Q[cur];
  if(!ans[q.key])return;
  if(cur<Q.length-1){cur++;renderQ();}
  else showResult();
}

function prev(){if(cur>0){cur--;renderQ();}}

function updateProgress(){
  const p=((cur+1)/Q.length)*100;
  document.getElementById('progressBar').style.width=p+'%';
  document.getElementById('progressText').textContent=cur+1+' / '+Q.length;
}

      <div class="r-section"><div class="r-label"><span class="emoji">🌿</span> 寿元养生</div><p>${r.health}</p></div>
      <div class="r-section"><div class="r-label"><span class="emoji">⭐</span> 星座印证</div><p>${r.zodiac}</p></div>
      <div class="r-section"><div class="r-label"><span class="emoji">🔮</span> 流年锦囊</div><p>${r.advice}</p></div>
      <div class="share-row">
        <button class="btn-share btn-share-link" onclick="shareLink()">📋 复制链接</button>
        <button class="btn-share btn-share-img" onclick="shareImage()">🖼️ 生成分享图</button>
      </div>
      <div class="result-footer">
        <div class="brand">✦ 照德堂 · 以自然之道养自然之身 ✦</div>
        <div class="slogan">长沙雨花区 · 药食同源 · 手作护肤</div>
        <div class="disclaimer">📌 仅供趣味参考 · 真正的命在自己手中</div>
        <button class="btn-restart" onclick="restart()">🔄 重新测算</button>
      </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
  },1200);
}

function shareLink(){
  const url=window.location.href;
  if(navigator.share){navigator.share({title:'生辰八字·综合精算',text:'我测了我的八字财运婚姻寿命，你也试试！',url}).catch(()=>{});}
  else{
    const ta=document.createElement('textarea');
    ta.value='🔮 我测了我的八字命盘！\n生辰八字·财运婚姻寿命·综合精算\n'+url;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('✅ 链接已复制，快去分享给朋友吧！');
  }
}

function shareImage(){
  const ov=document.getElementById('loadingOverlay');
  ov.querySelector('.loading-text').textContent='🖼️ 生成分享图中...';
  ov.classList.add('show');
  setTimeout(()=>{
    const r=calcResult(ans);
    const cv=document.getElementById('shareCanvas'),ctx=cv.getContext('2d');
    const W=400,H=600;cv.width=W;cv.height=H;
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0015');g.addColorStop(.5,'#1a0a2e');g.addColorStop(1,'#0d0221');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    for(let i=0;i<30;i++){const x=Math.random()*W,y=Math.random()*H,rr=Math.random()*1.5+.5;ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.6+.2)+')';ctx.fill();}
    ctx.fillStyle='#c8a96e';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('✦ 照德堂 · 生辰八字综合精算 ✦',W/2,40);
    ctx.strokeStyle='rgba(200,169,110,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,55);ctx.lineTo(W-40,55);ctx.stroke();
    ctx.font='48px sans-serif';ctx.fillText(r.icon,W/2,110);
    ctx.fillStyle='#f0e6c5';ctx.font='bold 22px sans-serif';ctx.fillText(r.title,W/2,150);
    ctx.font='11px sans-serif';ctx.fillStyle='#c8a96e';ctx.fillText(r.tags.join('  ·  '),W/2,175);
    ctx.beginPath();ctx.moveTo(60,190);ctx.lineTo(W-60,190);ctx.stroke();
    ctx.fillStyle='#c8bca0';ctx.font='12px sans-serif';
    wt(ctx,r.portrait.substring(0,90)+(r.portrait.length>90?'……':''),40,215,320,18);
    ctx.fillStyle='#b22222';ctx.font='bold 12px sans-serif';ctx.textAlign='left';
    ctx.fillText('💰 财运',40,290);ctx.fillStyle='#b8a88a';ctx.font='11px sans-serif';
    const ws=r.wealth.substring(0,50);ctx.fillText(ws+(r.wealth.length>50?'……':''),40,310);
    ctx.fillStyle='#b22222';ctx.font='bold 12px sans-serif';ctx.fillText('💕 姻缘',40,345);ctx.fillStyle='#b8a88a';ctx.font='11px sans-serif';
    const ms=r.marriage.substring(0,50);ctx.fillText(ms+(r.marriage.length>50?'……':''),40,365);
    ctx.fillStyle='#b22222';ctx.font='bold 12px sans-serif';ctx.fillText('🌿 寿元',40,400);ctx.fillStyle='#b8a88a';ctx.font='11px sans-serif';
    const hs=r.health.substring(0,50);ctx.fillText(hs+(r.health.length>50?'……':''),40,420);
    ctx.textAlign='center';ctx.fillStyle='#c8a96e';ctx.font='12px sans-serif';
    const as=r.advice.substring(0,36);ctx.fillText('🔮 流年锦囊: '+as+(r.advice.length>36?'……':''),W/2,470);
    ctx.fillStyle='rgba(200,169,110,.3)';ctx.font='14px sans-serif';ctx.fillText('↑ 扫码也可自测 ↑',W/2,510);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='10px sans-serif';ctx.fillText('长按分享 · 仅供趣味参考 · 命运在自己手中',W/2,535);
    ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.fillText('照德堂 · 长沙雨花区',W/2,558);

    const dataUrl=cv.toDataURL('image/png');
    ov.classList.remove('show');
    ov.querySelector('.loading-text').textContent='🔮 命盘推算中...';
    const wrap=document.getElementById('resultWrap');
    const ih='<div style="text-align:center;margin-bottom:16px"><img src="'+dataUrl+'" style="width:100%;max-width:360px;border-radius:16px;border:2px solid rgba(200,169,110,.2)" alt="分享图"><p style="color:#c8a96e;font-size:13px;margin-top:10px">👆 长按图片保存 · 发朋友圈</p></div>';
    const sr=wrap.querySelector('.share-row');
    if(sr)sr.insertAdjacentHTML('beforebegin',ih);
    toast('🖼️ 分享图已生成！长按保存发朋友圈');
  },800);
}

function wt(ctx,t,x,y,mw,lh){
  let l=[],cl='';
  for(let i=0;i<t.length;i++){cl+=t[i];if(ctx.measureText(cl).width>mw){l.push(cl.slice(0,-1));cl=t[i];}}
  if(cl)l.push(cl);
  l.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lh));
}

function restart(){
  document.getElementById('screenResult').classList.remove('active');
  const ei=document.querySelector('.result-wrap img');
  if(ei&&ei.parentElement&&ei.parentElement.tagName==='DIV'&&ei.parentElement.style.textAlign==='center')ei.parentElement.remove();
  Object.keys(ans).forEach(k=>delete ans[k]);cur=0;
  document.getElementById('screenCover').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Stars
(function(){
  const c=document.getElementById('starsContainer');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.width=s.style.height=Math.random()*2+1+'px';
    s.style.setProperty('--dur',(Math.random()*3+2).toFixed(1)+'s');
    s.style.animationDelay=Math.random()*5+'s';
    c.appendChild(s);
  }
})();
</script>
</body>
</html>
