const ZE = {rat:{e:'water',s:'冬'},ox:{e:'earth',s:'冬'},tiger:{e:'wood',s:'春'},rabbit:{e:'wood',s:'春'},dragon:{e:'earth',s:'春'},snake:{e:'fire',s:'夏'},horse:{e:'fire',s:'夏'},goat:{e:'earth',s:'夏'},monkey:{e:'metal',s:'秋'},rooster:{e:'metal',s:'秋'},dog:{e:'earth',s:'秋'},pig:{e:'water',s:'冬'}};
const SE = {aries:'fire',taurus:'earth',gemini:'air',cancer:'water',leo:'fire',virgo:'earth',libra:'air',scorpio:'water',sagittarius:'fire',capricorn:'earth',aquarius:'air',pisces:'water'};
const TE = {dawn:'wood',morning:'fire',afternoon:'earth',evening:'metal',night:'water',late:'earth'};
const SEASON_E = {spring:'wood',summer:'fire',mid:'earth',autumn:'metal',winter:'water'};
const DIET_E = {meat:'metal',veg:'wood',seafood:'water',spicy:'fire',grain:'earth'};
const SPENDING_M = {frugal:'kr',enjoy:'kd',invest:'kz',casual:'ks',save:'kg'};
const SOCIAL_M = {social_butterfly:'bj',close_few:'gr',solo:'yx',switch:'ph'};
const PHIL_M = {steady:'bx',daring:'mz',go_with:'sy',strive:'pg'};

// ============================================================
// 运算引擎
// ============================================================
function calcResult(a){
  const ze=ZE[a.zodiac].e, se=SEASON_E[a.season], te=TE[a.birth_time], pe=a.element, sige=SE[a.zodiac_sign];
  const die=DIET_E[a.diet];
  const c={metal:0,wood:0,water:0,fire:0,earth:0};
  [ze,se,te,pe,sige,die].forEach(e=>{if(c[e]!==undefined)c[e]++});
  const has=(e)=>c[e]>=2, combo=(x,y)=>c[x]>=1&&c[y]>=1;

  let k;
  if(has('metal')&&has('earth')) k='golden_toad';
  else if(has('metal')&&has('water')) k='white_crane';
  else if(has('fire')&&c.fire>=2) k='phoenix_fire';
  else if(has('water')&&c.water>=2&&combo('water','metal')) k='silver_carp';
  else if(has('water')&&c.water>=2) k='dark_turtle';
  else if(has('wood')&&has('fire')) k='deer_spring';
  else if(has('wood')&&c.wood>=2) k='jade_rabbit';
  else if(has('earth')&&c.earth>=2&&combo('earth','water')) k='blue_ox';
  else if(has('earth')&&c.earth>=2&&combo('earth','fire')) k='unicorn_mountain';
  else if(has('water')&&has('fire')) k='phoenix_mate';
  else if(has('metal')&&c.metal>=2) k='golden_dragon';
  else if(has('earth')&&has('water')) k='turtle_fortune';
  else k='purple_star';

  // 微调
  if(a.focus==='health'&&k==='blue_ox') k='jade_rabbit';
  if(a.focus==='wealth'&&(k==='jade_rabbit'||k==='unicorn_mountain')) k='golden_toad';
  if(a.focus==='marriage'&&k==='blue_ox') k='phoenix_mate';

  const r=JSON.parse(JSON.stringify(R[k]||FALLBACK));

  // 根据个人答案丰富结果细节
  // 饮食 × 健康建议
  if(a.diet==='spicy'&&r.health.length<100) r.health+=' 特别提醒：你爱吃辣，需适度控制——过辣耗阴伤胃，建议每周至少两天清淡饮食给肠胃放个假。';
  else if(a.diet==='meat'&&r.health.length<100) r.health+=' 特别提醒：肉食为主需多搭配蔬菜水果，红肉摄入建议每周不超过3次，多选鱼禽类。';
  else if(a.diet==='veg'&&r.health.length<100) r.health+=' 特别提醒：素食者需注意补充优质蛋白和B12，豆类、菌菇、蛋奶都是好选择。';
  else if(a.diet==='seafood'&&r.health.length<100) r.health+=' 特别提醒：海鲜虽好但偏寒湿，建议搭配姜蒜同食，脾胃虚寒者不宜过量。';

  // 消费 × 财运建议
  if(a.spending==='casual') r.wealth+=' ⚠️ 你的随性消费习惯需要重点关注——建议设置每月预算上限并坚持记账。';
  else if(a.spending==='frugal') r.wealth+=' ✅ 你的精打细算是好习惯，但记得偶尔也要奖励自己——财富是用来服务生活的。';
  else if(a.spending==='enjoy') r.wealth+=' 💡 你懂得享受生活是好事，建议在每月收入到账时先存后花，控制冲动消费比例。';

  // 感情 × 婚姻建议
  if(a.relationship==='single_wait') r.marriage+=' 你在等待一个对的人——今年可以试着扩大社交圈，缘分往往在你走出舒适区时出现。';
  else if(a.relationship==='single_happy') r.marriage+=' 享受单身本身就是一种福气。你不需要为了结婚而结婚，对的人出现之前先做好自己。';
  else if(a.relationship==='complex') r.marriage+=' 经历感情波动期时，最重要的不是立刻做决定，而是给自己足够的冷静时间。';

  // 社交 × 人缘
  if(a.social==='social_butterfly') r.portrait+=' 你的社交天赋非常突出，朋友遍天下——但要注意筛选真正值得深交的人。';
  else if(a.social==='solo') r.portrait+=' 你喜欢独处不是孤僻，而是你的能量来源方式。保留高质量的独处时间对你的成长很重要。';
  else if(a.social==='close_few') r.portrait+=' 你深谙「少即是多」的社交智慧——几个真朋友胜过一群点赞之交。';

  // 运势 × 流年建议
  if(a.current_fortune==='low') r.advice+=' 低谷期正是积累能量的最佳时机——把重心放在学习、运动和健康上，好运正在路上。';
  else if(a.current_fortune==='low_rising') r.advice+=' 触底回升的势头已经出现，保持住这个节奏。下半年会比上半年明显好转。';
  else if(a.current_fortune==='turning') r.advice+=' 转折期最忌讳的是「急于求成」——顺势而为比逆流而上聪明得多。';

  // 信条 × 事业建议
  if(a.philosophy==='strive'||a.philosophy==='daring') r.advice+=' 你命里有「造命」的勇气，这是很好的品质。但建议大决策前多征求身边稳重型朋友的意见。';
  else if(a.philosophy==='steady') r.advice+=' 你的稳重是你的核心竞争力。今年可以适当尝试一些「有把握的冒险」——太保守也会错过机会。';
  else if(a.philosophy==='go_with') r.advice+=' 你的随缘心态让你少了很多焦虑。但今年值得在某些重要领域「主动争取」一次——你值得更好的。';

  return r;
}

// ============================================================
// UI交互
// ============================================================
let cur=0;
const ans={};

function startQuiz(){
  g('screenCover').classList.remove('active');
  g('screenQuiz').classList.add('active');
  cur=0;renderQ();
}
function g(id){return document.getElementById(id);}

function renderQ(){
  const q=Q[cur],card=g('quizCard'),total=Q.length;
  let h=`<div class="quiz-qnum">第 ${cur+1}/${total} 题</div><div class="quiz-q">${q.q}</div><div class="quiz-desc">${q.desc}</div><div class="quiz-options">`;
  q.options.forEach(o=>{const sel=ans[q.key]===o.v?' selected':'';h+=`<div class="quiz-opt${sel}" onclick="sel('${q.key}','${o.v}')"><span>${o.l}</span><span class="badge">${o.badge}</span></div>`;});
  h+=`</div><div class="btn-row">${cur>0?'<button class="btn-prev" onclick="prev()">← 上一题</button>':''}<button class="btn-next${ans[q.key]?' active':''}" id="btnNext" onclick="next()">${cur===total-1?'🔮 查看命盘 →':'下一步 →'}</button></div>`;
  card.innerHTML=h;updP();
}
function sel(k,v){ans[k]=v;renderQ();}
function next(){const q=Q[cur];if(!ans[q.key])return;if(cur<Q.length-1){cur++;renderQ();}else showResult();}
function prev(){if(cur>0){cur--;renderQ();}}
function updP(){const p=((cur+1)/Q.length)*100;g('progressBar').style.width=p+'%';g('progressText').textContent=cur+1+' / '+Q.length;}

function showResult(){
  const ov=g('loadingOverlay');ov.classList.add('show');
  setTimeout(()=>{
    ov.classList.remove('show');g('screenQuiz').classList.remove('active');g('screenResult').classList.add('active');
    const r=calcResult(ans),w=g('resultWrap');
    w.innerHTML=`<div class="result-header"><span class="result-icon">${r.icon}</span><div class="result-title">${r.title}</div><div class="result-subtitle">${r.subtitle}</div><div class="result-tags">${r.tags.map(t=>'<span>'+t+'</span>').join('')}</div></div>
<div class="r-section"><div class="r-label"><span class="emoji">📜</span> 八字命理画像</div><p>${r.portrait}</p></div>
<div class="r-section"><div class="r-label"><span class="emoji">💰</span> 财运精批</div><p>${r.wealth}</p></div>
<div class="r-section"><div class="r-label"><span class="emoji">💕</span> 婚姻之缘</div><p>${r.marriage}</p></div>
<div class="r-section"><div class="r-label"><span class="emoji">🌿</span> 寿元养生</div><p>${r.health}</p></div>
<div class="r-section"><div class="r-label"><span class="emoji">⭐</span> 星座印证</div><p>${r.zodiac}</p></div>
<div class="r-section"><div class="r-label"><span class="emoji">🔮</span> 流年锦囊</div><p>${r.advice}</p></div>
<div class="share-row"><button class="btn-share btn-share-link" onclick="shareLink()">📋 复制链接</button><button class="btn-share btn-share-img" onclick="shareImage()">🖼️ 生成分享图</button></div>
<div class="result-footer"><div class="brand">✦ 照德堂 · 以自然之道养自然之身 ✦</div><div class="slogan">长沙雨花区 · 药食同源 · 手作护肤</div><div class="disclaimer">📌 仅供趣味参考 · 真正的命在自己手中</div><button class="btn-restart" onclick="restart()">🔄 重新测算</button></div>`;
    window.scrollTo({top:0,behavior:'smooth'});
  },1200);
}

function shareLink(){
  const url=window.location.href;
  if(navigator.share){navigator.share({title:'生辰八字·综合精算',text:'我测了我的八字财运婚姻寿命，你也试试！共12道精算题',url}).catch(()=>{});}
  else{const ta=document.createElement('textarea');ta.value='🔮 我测了我的八字命盘！\n生辰八字·财运婚姻寿命·综合精算（12道精算题）\n'+url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ 链接已复制！');}
}

function shareImage(){
  const ov=g('loadingOverlay');g('loadingText').textContent='🖼️ 生成分享图中...';ov.classList.add('show');
  setTimeout(()=>{
    const r=calcResult(ans),cv=g('shareCanvas'),ctx=cv.getContext('2d');
    const W=400,H=620;cv.width=W;cv.height=H;
    const gd=ctx.createLinearGradient(0,0,0,H);
    gd.addColorStop(0,'#0a0015');gd.addColorStop(.5,'#1a0a2e');gd.addColorStop(1,'#0d0221');
    ctx.fillStyle=gd;ctx.fillRect(0,0,W,H);
    for(let i=0;i=28;i++){const x=Math.random()*W,y=Math.random()*H,rr=Math.random()*1.5+.5;ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.6+.2)+')';ctx.fill();}
    ctx.fillStyle='#c8a96e';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('✦ 照德堂 · 八字综合精算 ✦',W/2,35);
    ctx.strokeStyle='rgba(200,169,110,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,48);ctx.lineTo(W-30,48);ctx.stroke();
    ctx.font='44px sans-serif';ctx.fillText(r.icon,W/2,100);
    ctx.fillStyle='#f0e6c5';ctx.font='bold 20px sans-serif';ctx.fillText(r.title,W/2,135);
    ctx.font='10px sans-serif';ctx.fillStyle='#c8a96e';ctx.fillText(r.tags.join(' · '),W/2,155);
    ctx.beginPath();ctx.moveTo(50,168);ctx.lineTo(W-50,168);ctx.stroke();
    ctx.fillStyle='#c8bca0';ctx.font='11px sans-serif';
    const pt=r.portrait.substring(0,80)+(r.portrait.length>80?'……':'');
    wt(ctx,pt,30,188,340,16);
    ctx.fillStyle='#b22222';ctx.font='bold 11px sans-serif';ctx.textAlign='left';
    ctx.fillText('💰 财运',30,255);ctx.fillStyle='#b8a88a';ctx.font='10px sans-serif';const ws=r.wealth.substring(0,45);ctx.fillText(ws+(r.wealth.length>45?'……':''),30,272);
    ctx.fillStyle='#b22222';ctx.font='bold 11px sans-serif';ctx.fillText('💕 姻缘',30,302);ctx.fillStyle='#b8a88a';ctx.font='10px sans-serif';const ms=r.marriage.substring(0,45);ctx.fillText(ms+(r.marriage.length>45?'……':''),30,319);
    ctx.fillStyle='#b22222';ctx.font='bold 11px sans-serif';ctx.fillText('🌿 寿元',30,349);ctx.fillStyle='#b8a88a';ctx.font='10px sans-serif';const hs=r.health.substring(0,45);ctx.fillText(hs+(r.health.length>45?'……':''),30,366);
    ctx.fillStyle='#b22222';ctx.font='bold 11px sans-serif';ctx.fillText('⭐ 星座',30,396);ctx.fillStyle='#b8a88a';ctx.font='10px sans-serif';const zs=r.zodiac.substring(0,45);ctx.fillText(zs+(r.zodiac.length>45?'……':''),30,413);
    ctx.textAlign='center';ctx.fillStyle='#c8a96e';ctx.font='bold 11px sans-serif';ctx.fillText('🔮 流年锦囊',W/2,450);
    ctx.fillStyle='#c8bca0';ctx.font='10px sans-serif';const as=r.advice.substring(0,50);ctx.fillText(as+(r.advice.length>50?'……':''),W/2,468);
    ctx.fillStyle='rgba(200,169,110,.25)';ctx.font='13px sans-serif';ctx.fillText('↑ 扫码自测 ↑',W/2,508);
    ctx.fillStyle='rgba(255,255,255,.12)';ctx.font='10px sans-serif';ctx.fillText('长按分享 · 仅供趣味参考',W/2,535);
    ctx.fillStyle='#555';ctx.font='9px sans-serif';ctx.fillText('照德堂 · 长沙雨花区',W/2,558);
    const du=cv.toDataURL('image/png');
    ov.classList.remove('show');g('loadingText').textContent='🔮 命盘推算中...';
    const wrap=g('resultWrap'),ih='<div style="text-align:center;margin-bottom:14px"><img src="'+du+'" style="width:100%;max-width:340px;border-radius:14px;border:2px solid rgba(200,169,110,.2)" alt="分享图"><p style="color:#c8a96e;font-size:12px;margin-top:8px">👆 长按图片保存 · 发朋友圈</p></div>';
    const sr=wrap.querySelector('.share-row');if(sr)sr.insertAdjacentHTML('beforebegin',ih);
    toast('🖼️ 分享图已生成！');
  },800);
}

function wt(ctx,t,x,y,mw,lh){let l=[],cl='';for(let i=0;i<t.length;i++){cl+=t[i];if(ctx.measureText(cl).width>mw){l.push(cl.slice(0,-1));cl=t[i];}}if(cl)l.push(cl);l.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lh));}

function restart(){
  g('screenResult').classList.remove('active');
  const ei=document.querySelector('.result-wrap img');
  if(ei&&ei.parentElement&&ei.parentElement.tagName==='DIV'&&ei.parentElement.style.textAlign==='center')ei.parentElement.remove();
  Object.keys(ans).forEach(k=>delete ans[k]);cur=0;g('screenCover').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function toast(m){const t=g('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Stars
(function(){const c=g('starsContainer');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.width=s.style.height=Math.random()*2+1+'px';s.style.setProperty('--dur',(Math.random()*3+2).toFixed(1)+'s');s.style.animationDelay=Math.random()*5+'s';c.appendChild(s);}})();
</script>
</body>
</html>
