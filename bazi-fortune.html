function calcResult(a){
  const src=[ZE[a.zodiac].e,SE[a.season],TE[a.birth_time],a.element,SIE[a.zodiac_sign],DIE[a.diet],COLE[a.color],HOMELE[a.home],LEIE[a.leisure],CHILDE[a.childhood],CRISISE[a.crisis],ZW_E[a.ziwei_star]];
  const c={metal:0,wood:0,water:0,fire:0,earth:0};
  src.forEach(e=>{if(c[e]!==undefined)c[e]++});
  const has=(e)=>c[e]>=2,combo=(x,y)=>c[x]>=1&&c[y]>=1;
  let k;
  if(has('metal')&&has('earth'))k='golden_toad';
  else if(has('metal')&&has('water'))k='white_crane';
  else if(has('fire')&&c.fire>=2)k='phoenix_fire';
  else if(has('water')&&c.water>=2&&combo('water','metal'))k='silver_carp';
  else if(has('water')&&c.water>=2)k='dark_turtle';
  else if(has('wood')&&has('fire'))k='deer_spring';
  else if(has('wood')&&c.wood>=2)k='jade_rabbit';
  else if(has('earth')&&c.earth>=2&&combo('earth','water'))k='blue_ox';
  else if(has('earth')&&c.earth>=2&&combo('earth','fire'))k='unicorn_mountain';
  else if(has('water')&&has('fire'))k='phoenix_mate';
  else if(has('metal')&&c.metal>=2)k='golden_dragon';
  else if(has('earth')&&has('water'))k='turtle_fortune';
  else k='purple_star';
  if(a.focus==='health'&&k==='blue_ox')k='jade_rabbit';
  if(a.focus==='wealth'&&(k==='jade_rabbit'||k==='unicorn_mountain'))k='golden_toad';
  if(a.focus==='marriage'&&k==='blue_ox')k='phoenix_mate';
  const r=JSON.parse(JSON.stringify(R[k]||FALLBACK));
  // 饮食微调
  if(a.diet==='spicy')r.health+=' ⚠️ 你爱吃辣，建议适度控制——过辣耗阴伤胃，每周至少两天清淡饮食。';

  else if(a.spending==='enjoy')r.wealth+=' 💡 懂得享受生活是好事，建议到账先存后花，控制冲动消费。';
  // 感情微调
  if(a.relationship==='single_wait')r.marriage+=' 你一直在等待——今年可以试着扩大社交圈，缘分往往在走出舒适区时出现。';
  else if(a.relationship==='single_happy')r.marriage+=' 享受单身本身就是福气。不必为结婚而结婚，对的人出现前先做好自己。';
  else if(a.relationship==='complex')r.marriage+=' 感情波动期最需要的是「给自己时间」——不用急着做决定。';
  else if(a.relationship==='separated')r.marriage+=' 经历过感情的转折之后，你是带着更清醒的认知在等待下一段——这样更好。';
  // 社交微调
  if(a.social==='social_butterfly')r.portrait+=' 你的社交天赋很强，朋友遍天下——但注意筛选真正值得深交的人。';
  else if(a.social==='solo')r.portrait+=' 喜欢独处是你的能量来源方式，高质量的独处时间对你很重要。';
  else if(a.social==='close_few')r.portrait+=' 「少即是多」的社交智慧——几个真朋友胜过一群点赞之交。';
  // 睡眠微调
  if(a.sleep==='very_late'||a.sleep==='late')r.health+=' 💤 你属于熬夜体质，长期熬夜耗阴伤肝。建议逐步提前作息，23点前入睡是关键。';
  else if(a.sleep==='early')r.health+=' 🌙 早睡早起的好习惯是你健康长寿的重要保障，继续保持！';
  // 工作微调
  if(a.career==='entrepreneur'||a.career==='slasher')r.wealth+=' 你的创业/跨界精神很好，但创业初期建议保持现金流稳定，不要全押。';

  // 睡眠微调

  // 困境应对微调
  if(a.crisis==='fight')r.advice+=' 🔥 你遇事硬刚到底，勇气可嘉。但有时候「不硬扛」也是种智慧——学会借力。';

  // 童年微调
  if(a.childhood==='moved')r.portrait+=' 你小时候经历过多次环境变化，这造就了你强大的适应力和不恋旧的性格。';
  else if(a.childhood==='big_family')r.portrait+=' 大家庭长大的你天生懂得人情世故和分享，这是你一生的财富。';
  // 运势微调
  if(a.current_fortune==='low')r.advice+=' 💪 低谷期正是积累能量的最佳时机——重心放在学习、运动和健康上，好运在路上。';
  else if(a.current_fortune==='low_rising')r.advice+=' 📈 触底回升的势头已经出现，保持住这个节奏，下半年会比上半年明显好转。';
  else if(a.current_fortune==='turning')r.advice+=' ⚖️ 转折期最忌讳急功近利——顺势而为比逆流而上聪明得多。';
  // 星座配饰
  if(a.color==='red')r.zodiac+=' 你偏爱红色说明内心渴望热情与活力，这与火象星座的能量同频共振。';
  else if(a.color==='blue')r.zodiac+=' 偏爱蓝色代表你内在冷静理性的一面，水象和风象星座最能理解你的世界。';
  else if(a.color==='green')r.zodiac+=' 喜欢绿色说明你渴望自然与生长，木性充沛的人往往与植物有天然亲近感。';
  // 居住微调
  if(a.home==='water_mountain')r.wealth+=' 你理想中依山傍水的环境说明你的气场合水木，适合在近水或绿化好的地方置产。';

  // 紫微斗数分析
  r.ziwei='';
  if(a.ziwei_star){
    var zwMainDesc=ZW_DESC[a.ziwei_star]||'你的紫微命盘主星组合独特，建议结合具体八字详细分析。';
    r.ziwei='【命宫主星】'+zwMainDesc;

    if(a.ziwei_palace==='wealth'||a.spending==='frugal'||a.spending==='invest')r.ziwei+=' 你的财帛宫有「化禄」的倾向——财运方面有天然的优势，赚钱相对轻松。';

    else if(a.ziwei_palace==='self'||a.crisis==='think')r.ziwei+=' 你的命宫有「化忌」回冲后的觉醒——你经历的挫折最终会变成你的铠甲。';
  }
  if(a.ziwei_palace&&ZW_PALACE_DESC[a.ziwei_palace]){
    r.ziwei+=' 【十二宫指引】'+ZW_PALACE_DESC[a.ziwei_palace];
  }
  // 紫微+星座联动
  var starZodiacMap={zw_tf:'♌ 狮子',tj_th:'♍ 处女',ty_tl:'♐ 射手',wq_qs:'♑ 摩羯',tt_tx:'♎ 天秤',lt_tl:'♏ 天蝎',po_jm:'♒ 水瓶'};

    db('⭐ 星座',r.zodiac,yy);yy+=bh+8;
    // 流年锦囊
    yy+=6;ctx.textAlign='center';ctx.fillStyle='#c8a96e';ctx.font='bold 13px sans-serif';ctx.fillText('🔮 流年锦囊',BW/2,yy);yy+=24;
    ctx.fillStyle='#c8bca0';ctx.font='11px sans-serif';
    var atext=r.advice.replace(/[【】\*\*⚠️✅💡⏰🔥🤝🧠💪📈⚖️]/g,'').substring(0,72);
    var cl='',ln=0;ctx.textAlign='center';
    for(var i=0;i<atext.length;i++){cl+=atext[i];if(ctx.measureText(cl).width>BW-80){ctx.fillText(cl.slice(0,-1),BW/2,yy+ln*15);cl=atext[i];ln++;}}
    if(cl)ctx.fillText(cl,BW/2,yy+ln*15);yy+=ln*15+14;
    // 二维码
    if(qr&&qrLoaded){
      var qs=110,qx=(BW-qs)/2;
      // 白色底
      ctx.fillStyle='#fff';ctx.beginPath();ctx.rect(qx-6,yy-6,qs+12,qs+12);ctx.fill();
      ctx.drawImage(qr,qx,yy,qs,qs);
      yy+=qs+10;
    }else{
      // 无二维码时留文字空间
      yy+=20;
    }
    ctx.textAlign='center';
    ctx.fillStyle='#c8a96e';ctx.font='bold 12px sans-serif';ctx.fillText('长按或扫描二维码 → 开始测算',BW/2,yy);yy+=22;
    ctx.fillStyle='rgba(255,255,255,.08)';ctx.font='9px sans-serif';ctx.fillText('仅供趣味参考 · 命运在自己手中',BW/2,yy);yy+=14;
    ctx.fillStyle='#555';ctx.font='9px sans-serif';ctx.fillText('照德堂 · 长沙雨花区',BW/2,yy);
    // 输出
    const du=cv.toDataURL('image/jpeg',0.92);
    ov.classList.remove('show');g('loadingText').textContent='🔮 命盘推算中...';
    const wrap=g('resultWrap');
    const old=wrap.querySelector('.bazi-share-wrap');if(old)old.remove();
    const ih='<div class="bazi-share-wrap" style="text-align:center;margin-bottom:14px"><img src="'+du+'" style="display:block;width:100%;border-radius:12px;border:2px solid rgba(200,169,110,.2)" alt="分享图"><p style="color:#c8a96e;font-size:11px;margin-top:8px">👆 长按图片保存 · 发朋友圈</p></div>';
    const sr=wrap.querySelector('.share-row');if(sr)sr.insertAdjacentHTML('beforebegin',ih);
    toast('🖼️ 分享图已生成！');
  }
  // 辅助函数
  function drawWrapped(c,t,x,y,mw,lh){var cl='',ln=0;for(var i=0;i<t.length;i++){cl+=t[i];if(c.measureText(cl).width>mw){c.fillText(cl.slice(0,-1),x,y+ln*lh);cl=t[i];ln++;}}if(cl)c.fillText(cl,x,y+ln*lh);}
  function calcWL(c,t,mw){var cl='',ln=0;for(var i=0;i<t.length;i++){cl+=t[i];if(c.measureText(cl).width>mw){cl=t[i];ln++;}}return ln+1;}
}
function wt(ctx,t,x,y,mw,lh){let l=[],cl='';for(let i=0;i<t.length;i++){cl+=t[i];if(ctx.measureText(cl).width>mw){l.push(cl.slice(0,-1));cl=t[i];}}if(cl)l.push(cl);l.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lh));}
function restart(){
  g('screenResult').classList.remove('active');
  const old=document.querySelector('.bazi-share-wrap');if(old)old.remove();
  Object.keys(ans).forEach(k=>delete ans[k]);cur=0;g('screenCover').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function toast(m){const t=g('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
(function(){const c=g('starsContainer');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.width=s.style.height=Math.random()*2+1+'px';s.style.setProperty('--dur',(Math.random()*3+2).toFixed(1)+'s');s.style.animationDelay=Math.random()*5+'s';c.appendChild(s);}})();
</script>
