var answers = {};
var currentStep = 0;
var totalSteps = Q.length;

function startQuiz(){
  document.getElementById("heroPage").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  renderQuestion(0);
}

function renderQuestion(idx){
  if(idx >= totalSteps){ showResult(); return; }
  currentStep = idx;
  var q = Q[idx];
  var pct = Math.round(((idx+1)/totalSteps)*100);
  document.getElementById("progressText").textContent = (idx+1)+" / "+totalSteps;
  document.getElementById("progressBar").style.width = pct+"%";

  var selKey = answers[q.key] || "";
  var container = document.getElementById("quizCards");
  var html = '<div class="card active">';
  html += '<div class="step-num">第 '+(idx+1)+' 题 / 共 '+totalSteps+' 题</div>';
  html += '<h2>'+q.q+'</h2>';
  html += '<div class="desc">'+q.desc+'</div>';
  html += '<div class="options">';

  for(var i=0; i<q.options.length; i++){
    var o = q.options[i];
    var selected = (selKey === o.v) ? "selected" : "";
    html += '<div class="option '+selected+'" data-val="'+o.v+'" data-qkey="'+q.key+'" onclick="pickOption(this)">';
    html += '<span style="font-size:20px">'+o.e+'</span>';
    html += '<span class="label">'+o.l+'</span>';
    html += '<span class="badge">'+o.b+'</span>';
    html += '</div>';
  }

  html += '</div><div class="btn-row">';
  if(idx > 0){
    html += '<button class="btn btn-secondary" onclick="prevQuestion()">← 上一题</button>';
  }
  var btnDisabled = selKey ? "" : "disabled";
  var btnText = (idx === totalSteps-1) ? "查看结果 →" : "下一题 →";
  html += '<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" '+btnDisabled+'>'+btnText+'</button>';
  html += '</div></div>';

  container.innerHTML = html;
}

function pickOption(el){
  var parent = el.parentNode;
  var opts = parent.querySelectorAll(".option");
  for(var i=0; i<opts.length; i++){ opts[i].classList.remove("selected"); }
  el.classList.add("selected");
  var qkey = el.getAttribute("data-qkey");
  var val = el.getAttribute("data-val");
  answers[qkey] = val;
  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion(){
  if(currentStep < totalSteps-1){
    renderQuestion(currentStep+1);
  } else {
    showResult();
  }
}

function prevQuestion(){
  if(currentStep > 0) renderQuestion(currentStep-1);
}

function wrapText(ctx, text, x, y, maxW, lineH, maxLines){
  var lines = [];
  var line = "";
  for(var i=0; i<text.length; i++){
    var c = text[i];
    line += c;
    if(ctx.measureText(line).width > maxW || c === "。" || c === "，" || c === "！" || c === "？"){
      if(c === "。" || c === "，" || c === "！" || c === "？"){
        lines.push(line);
      } else {
        lines.push(line.slice(0,-1));
        i--;
      }
      line = "";
      if(lines.length >= maxLines) break;
    }
  }
  if(line && lines.length < maxLines) lines.push(line);
  for(var i=0; i<lines.length; i++){
    ctx.fillText(lines[i], x, y + i*lineH);
  }
}

function closeOverlay(){
  document.getElementById("shareOverlay").classList.remove("show");
}

function restartQuiz(){
  for(var k in answers) delete answers[k];
  currentStep = 0;
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  renderQuestion(0);
  window.scrollTo(0,0);
}
