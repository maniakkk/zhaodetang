<title>命理体质自测 | 照德堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background:#F5F0E8;min-height:100vh;padding:20px;
}
.container{max-width:520px;margin:0 auto}

/* 封面区 */
.hero{
  background:linear-gradient(135deg,#2C1810 0%,#4A2C1A 100%);
  border-radius:16px;padding:40px 24px 32px;text-align:center;
  color:#FDF8F0;margin-bottom:20px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,169,110,.15) 0%,transparent 70%);
}
.hero-icon{font-size:48px;margin-bottom:12px}
.hero h1{font-size:26px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.hero p{font-size:14px;color:#C8A96E;line-height:1.6}
.hero .sub{font-size:13px;color:#A08060;margin-top:8px}

/* 进度条 */
.progress-wrap{
  background:#E8E0D0;border-radius:20px;height:6px;margin:0 0 20px;overflow:hidden;
}
.progress-bar{
  height:100%;background:linear-gradient(90deg,#B22222,#C8A96E);
  border-radius:20px;transition:width .4s ease;
}
.progress-text{text-align:center;font-size:13px;color:#8B7355;margin-bottom:4px}

/* 卡片 */
.card{
  background:#FDF8F0;border-radius:16px;padding:24px;
  box-shadow:0 2px 12px rgba(44,24,16,.06);margin-bottom:16px;
  display:none;animation:fadeIn .35s ease;
}
.card.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.step-num{
  font-size:12px;color:#B22222;font-weight:600;letter-spacing:1px;
  margin-bottom:4px;
}
.card h2{font-size:20px;color:#2C1810;margin-bottom:6px}
.card .desc{font-size:14px;color:#8B7355;margin-bottom:20px;line-height:1.6}

/* 选项 */
.options{display:flex;flex-direction:column;gap:10px}
.option{
  background:#F5F0E8;border:2px solid #E8E0D0;border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .2s;
  font-size:15px;color:#2C1810;line-height:1.5;
  display:flex;align-items:center;gap:12px;
}
.option:hover{border-color:#C8A96E;background:#F0E8D8}
.option.selected{border-color:#B22222;background:#FFF0E8}
.option .emoji{font-size:22px;flex-shrink:0}
.option .label{flex:1}
.option .badge{
  font-size:11px;color:#8B7355;background:#E8E0D0;
  padding:2px 10px;border-radius:10px;flex-shrink:0;
}

/* 按钮 */
.btn-row{display:flex;gap:12px;margin-top:20px}
.btn{
  flex:1;padding:14px;border:none;border-radius:12px;
  font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-primary{
  background:#B22222;color:#fff;
}
.btn-primary:hover{background:#8B1A1A}
.btn-primary:disabled{background:#D4C5A9;cursor:not-allowed}
.btn-secondary{
  background:#E8E0D0;color:#4A4A4A;
}
.btn-secondary:hover{background:#D4C5A9}

/* 结果页 */
.result-card{display:none}
.result-card.active{display:block}
.result-header{
  text-align:center;padding:30px 20px;
  background:linear-gradient(135deg,#2C1810,#4A2C1A);
  border-radius:16px;color:#FDF8F0;margin-bottom:20px;

.result-header .big-icon{font-size:64px;margin-bottom:12px}
.result-header h2{font-size:24px;margin-bottom:4px}
.result-header .tag{
  display:inline-block;background:#C8A96E;color:#2C1810;
  padding:4px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-top:8px;

.result-section{
  background:#FDF8F0;border-radius:12px;padding:20px;margin-bottom:12px;
  box-shadow:0 1px 6px rgba(44,24,16,.04);

.result-section h3{
  font-size:16px;color:#B22222;margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid #F0E8D8;
}
.result-section p,.result-section li{
  font-size:14px;color:#4A4A4A;line-height:1.8;
}
.result-section ul{padding-left:20px}
.result-section .highlight{
  background:linear-gradient(135deg,#FFF0E8,#FDF8F0);
  border-left:3px solid #B22222;padding:12px 16px;border-radius:0 8px 8px 0;
  margin:10px 0;font-size:14px;line-height:1.7;
}

  background:#F5F0E8;border:1px solid #E8E0D0;border-radius:12px;
  padding:16px 20px;text-align:center;margin-top:16px;
}
.brand-box p{font-size:13px;color:#8B7355;line-height:1.6}
.brand-box .brand-name{font-size:15px;color:#B22222;font-weight:600}

.share-btn{
  display:block;width:100%;padding:14px;
  background:#C8A96E;color:#2C1810;border:none;border-radius:12px;
  font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;

.share-btn:hover{background:#B89950}

.success-box{

.success-box .icon{font-size:72px;margin-bottom:16px}
.success-box h2{font-size:22px;color:#2C1810;margin-bottom:8px}
.success-box p{font-size:14px;color:#8B7355;line-height:1.8;margin-bottom:20px}

  background:#B22222;color:#fff;border:none;border-radius:12px;

/* footer */
.footer{
  text-align:center;padding:20px;font-size:12px;color:#A08060;
}

@media(max-width:400px){
  .hero{padding:28px 16px 24px}
  .hero h1{font-size:22px}
  .card{padding:18px}
  .option{padding:12px 14px;font-size:14px}

</style>
</head>

const ZODIAC_ELEMENT = {
  rat:{element:'water',season:'winter'},
  ox:{element:'earth',season:'winter'},
  tiger:{element:'wood',season:'spring'},
  rabbit:{element:'wood',season:'spring'},
  dragon:{element:'earth',season:'spring'},
  snake:{element:'fire',season:'summer'},
  horse:{element:'fire',season:'summer'},
  goat:{element:'earth',season:'summer'},
  monkey:{element:'metal',season:'autumn'},
  rooster:{element:'metal',season:'autumn'},
  dog:{element:'earth',season:'autumn'},
  pig:{element:'water',season:'winter'}
};

const answers = {};
let currentStep = 0;
let totalSteps = Q.length;

function startQuiz(){
  document.getElementById('heroPage').style.display='none';
  document.getElementById('quizArea').style.display='block';
  renderQuestion(0);
}

function renderQuestion(idx){
  if(idx >= totalSteps){showResult();return}
  currentStep=idx;
  const q=Q[idx];
  const pct=Math.round(((idx+1)/totalSteps)*100);
  document.getElementById('progressText').textContent=`${idx+1} / ${totalSteps}`;
  document.getElementById('progressBar').style.width=pct+'%';

  const container=document.getElementById('quizCards');
  let html=`
    <div class="card active">
      <div class="step-num">第 ${idx+1} 题</div>
      <h2>${q.q}</h2>
      <div class="desc">${q.desc}</div>
      <div class="options">
  `;
  q.options.forEach(o=>{
    const sel=answers[q.key]===o.v?'selected':'';
    html+=`
      <div class="option ${sel}" onclick="selectAnswer(${idx},'${q.key}','${o.v}',this)">
        <span class="emoji">${o.emoji||''}</span>
        <span class="label">${o.l}</span>
        <span class="badge">${o.badge}</span>
      </div>
    `;
  });
  html+=`</div><div class="btn-row">`;
  if(idx>0)html+=`<button class="btn btn-secondary" onclick="prevQuestion()">← 上一题</button>`;
  html+=`<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>${idx===totalSteps-1?'查看结果 →':'下一题 →'}</button>`;
  html+=`</div></div>`;
  container.innerHTML=html;
  if(answers[q.key])document.getElementById('nextBtn').disabled=false;
}

function selectAnswer(idx,key,val,el){
  answers[key]=val;
  document.querySelectorAll(`#quizCards .option`).forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('nextBtn').disabled=false;
}

function nextQuestion(){
  if(currentStep<totalSteps-1){
    renderQuestion(currentStep+1);
  }else{
    showResult();
  }
}

function prevQuestion(){
  if(currentStep>0)renderQuestion(currentStep-1);
}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('quizCards').innerHTML='';

  const z=answers.zodiac||'rabbit';
  const s=ZODIAC_ELEMENT[z]||{element:'water',season:'winter'};
  const p=answers.element_personality||'earth';

  const key=`${z}-${s.element}-${p}`;
  const result=RESULTS[key]||RESULTS['rabbit-water-wood'];

  const area=document.getElementById('resultArea');
  area.innerHTML=`
    <div class="result-card active">
      <div class="result-header">
        <div class="big-icon">${result.icon}</div>
        <h2>${result.title}</h2>
        <div class="tag">${result.tag}</div>
      </div>

      <div class="result-section">
        <h3>📋 你的命理画像</h3>
        <p>${result.summary}</p>
      </div>

      <div class="result-section">
        <h3>🎯 命里「缺」什么</h3>
        <div class="highlight">${result.destiny}</div>
      </div>

      <div class="result-section">
        <h3>🌿 日常补益建议</h3>
        <ul>${result.advice.map(a=>`<li>${a}</li>`).join('')}</ul>
      </div>

      <div class="result-section">
        <h3>🏪 照德堂 · 给你的专属建议</h3>
        <p>${result.product}</p>
      </div>

      <div class="brand-box">
        <p>以上测算仅供趣味参考 · 真正的「命」在自己手中</p>
        <p style="margin-top:4px">🌿 <span class="brand-name">照德堂</span> · 以传统智慧照见生活</p>
      </div>

      <button class="share-btn" onclick="shareResult()">📤 分享给朋友看看</button>
      <button class="btn btn-primary" style="margin-top:12px" onclick="restartQuiz()">🔄 再测一次</button>
    </div>
  `;
  area.style.display='block';
}

function shareResult(){
  if(navigator.share){
    navigator.share({title:'我的命理体质',text:'测测你的命里缺什么？'});
  }else{
    const resultText='我刚测了命理体质，挺准的！你也来试试 → ';
    navigator.clipboard.writeText(resultText+' 照德堂·命理体质自测').then(()=>{
      alert('✅ 已复制分享文案，快去发给朋友吧！');
    });
  }
}

function restartQuiz(){
  Object.keys(answers).forEach(k=>delete answers[k]);
  currentStep=0;
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('resultArea').style.display='none';
  document.getElementById('quizArea').style.display='block';
  renderQuestion(0);
}
</script>
