var FALLBACK_RESULT = RESULTS["rabbit-water-wood"];

var ZODIAC_ELEMENT = {
  rat:{element:"water",season:"winter"},ox:{element:"earth",season:"winter"},
  tiger:{element:"wood",season:"spring"},rabbit:{element:"wood",season:"spring"},
  dragon:{element:"earth",season:"spring"},snake:{element:"fire",season:"summer"},
  horse:{element:"fire",season:"summer"},goat:{element:"earth",season:"summer"},
  monkey:{element:"metal",season:"autumn"},rooster:{element:"metal",season:"autumn"},
  dog:{element:"earth",season:"autumn"},pig:{element:"water",season:"winter"}
};

var answers = {};
var currentStep = 0;
var totalSteps = Q.length;

function startQuiz(){
  document.getElementById("heroPage").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  renderQuestion(0);
}

function renderQuestion(idx){
  if(idx >= totalSteps){ showResult(); return; }
  currentStep = idx;
  var q = Q[idx];
  var pct = Math.round(((idx+1)/totalSteps)*100);
  document.getElementById("progressText").textContent = (idx+1)+" / "+totalSteps;
  document.getElementById("progressBar").style.width = pct+"%";

  var selKey = answers[q.key] || "";
  var container = document.getElementById("quizCards");
  var html = '<div class="card active">';
  html += '<div class="step-num">第 '+(idx+1)+' 题</div>';
  html += '<h2>'+q.q+'</h2>';
  html += '<div class="desc">'+q.desc+'</div>';
  html += '<div class="options">';

  for(var i=0; i<q.options.length; i++){
    var o = q.options[i];
    var selected = (selKey === o.v) ? "selected" : "";
    html += '<div class="option '+selected+'" data-val="'+o.v+'" data-qkey="'+q.key+'" onclick="pickOption(this)">';
    html += '<span>'+o.e+'</span>';
    html += '<span class="label">'+o.l+'</span>';
    html += '<span class="badge">'+o.b+'</span>';
    html += '</div>';
  }

  html += '</div><div class="btn-row">';
  if(idx > 0){
    html += '<button class="btn btn-secondary" onclick="prevQuestion()">← 上一题</button>';
  }
  var btnDisabled = selKey ? "" : "disabled";
  var btnText = (idx === totalSteps-1) ? "查看结果 →" : "下一题 →";
  html += '<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" '+btnDisabled+'>'+btnText+'</button>';
  html += '</div></div>';

  container.innerHTML = html;
}

function pickOption(el){
  var parent = el.parentNode;
  var opts = parent.querySelectorAll(".option");
  for(var i=0; i<opts.length; i++){ opts[i].classList.remove("selected"); }
  el.classList.add("selected");
  var qkey = el.getAttribute("data-qkey");
  var val = el.getAttribute("data-val");
  answers[qkey] = val;
  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion(){
  if(currentStep < totalSteps-1){
    renderQuestion(currentStep+1);
  } else {
    showResult();
  }
}

function prevQuestion(){
  if(currentStep > 0) renderQuestion(currentStep-1);
}

function showResult(){
  document.getElementById("quizArea").style.display = "none";
  document.getElementById("quizCards").innerHTML = "";

  var z = answers.zodiac || "rabbit";
  var ze = ZODIAC_ELEMENT[z] || {element:"water", season:"winter"};
  var p = answers.element_personality || "earth";

  var key = z+"-"+ze.element+"-"+p;
  var result = RESULTS[key] || FALLBACK_RESULT;

  var area = document.getElementById("resultArea");
  var html = '<div class="card active">';
  html += '<div class="result-header"><div class="big-icon">'+result.icon+'</div>';
  html += '<h2>'+result.title+'</h2>';
  html += '<div class="tag">'+result.tag+'</div></div>';

  html += '<div class="result-section"><h3>📋 你的命理画像</h3><p>'+result.summary+'</p></div>';
  html += '<div class="result-section"><h3>🎯 命里「缺」什么</h3><div class="highlight">'+result.destiny+'</div></div>';

  html += '<div class="result-section"><h3>🌿 日常补益建议</h3><ul>';
  for(var i=0; i<result.advice.length; i++){
    html += '<li>'+result.advice[i]+'</li>';
  }
  html += '</ul></div>';

  html += '<div class="result-section"><h3>🏪 照德堂 · 给你的专属建议</h3><p>'+result.product+'</p></div>';

  html += '<div class="brand-box"><p>以上测算仅供趣味参考 · 真正的「命」在自己手中</p>';
  html += '<p style="margin-top:4px">🌿 <span class="brand-name">照德堂</span> · 以传统智慧照见生活</p></div>';

  html += '<button class="share-btn" onclick="shareResult()">📤 分享给朋友看看</button>';
  html += '<button class="btn btn-primary" style="margin-top:12px" onclick="restartQuiz()">🔄 再测一次</button>';
  html += '</div>';

  area.innerHTML = html;
  area.style.display = "block";
  window.scrollTo(0,0);
}

function shareResult(){
  var txt = "我刚测了命理体质，挺准的！你也来试试 → 照德堂命理体质自测 🔮";
  if(navigator.share){
    navigator.share({title:"我的命理体质",text:txt});
  } else {
    var ta = document.createElement("textarea");
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("✅ 已复制分享文案，快去发给朋友吧！");
  }
}

function restartQuiz(){
  for(var k in answers) delete answers[k];
  currentStep = 0;
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  renderQuestion(0);
  window.scrollTo(0,0);
}

// Expose to global scope
window.startQuiz = startQuiz;
window.pickOption = pickOption;
window.nextQuestion = nextQuestion;
window.prevQuestion = prevQuestion;
window.shareResult = shareResult;
window.restartQuiz = restartQuiz;
})();
</script>
</body>
</html>
